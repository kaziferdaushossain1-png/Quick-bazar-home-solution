<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Quick Bazar Home Solution | আধুনিক স্যানিটারি শপ</title>
    <meta name="description" content="Quick Bazar Home Solution - সেরা স্যানিটারি ফিটিংস এবং আধুনিক হোম সলিউশন। আজই ২০% ছাড়ে অর্ডার করুন!">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --brand-red: #d63031; --brand-dark: #1a1a1a; --bg: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'SolaimanLipi', Arial, sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* ডান থেকে বামে যাওয়া বড় টেক্সট */
        .scrolling-notice {
            background: var(--brand-red); color: white;
            padding: 12px 0; font-weight: bold; font-size: 22px; /* লেখা বড় করা হয়েছে */
            white-space: nowrap; overflow: hidden; position: relative;
        }
        .scrolling-notice span {
            display: inline-block; padding-left: 100%;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* সেন্টার বড় লোগো */
        header { 
            background: var(--brand-dark); color: white; padding: 40px 20px; 
            border-bottom: 6px solid var(--brand-red);
            text-align: center; /* লোগো মাঝখানে আনার জন্য */
        }
        .logo { 
            font-size: 60px; /* লোগোর লেখা অনেক বড় করা হয়েছে */
            font-weight: 900; letter-spacing: 2px; 
            text-decoration: none; color: white; display: inline-block;
            animation: textHeartbeat 2s infinite; 
        }
        .logo span { color: var(--brand-red); }
        .tagline { font-size: 24px; color: #ccc; letter-spacing: 5px; margin-top: 5px; font-weight: 300; }

        @keyframes textHeartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 15px rgba(214, 48, 49, 0.4); }
            100% { transform: scale(1); }
        }

        /* সার্চ এরিয়া */
        .search-area { max-width: 1200px; margin: 25px auto; padding: 0 15px; display: flex; gap: 10px; }
        #search { 
            flex: 1; padding: 18px 25px; border-radius: 35px; border: 2px solid #ddd; 
            font-size: 16px; outline: none; transition: 0.3s;
        }
        #search:focus { border-color: var(--brand-red); }

        /* ছোট ও মার্জিত ভিডিও সেকশন */
        .video-container { max-width: 1200px; margin: 0 auto 20px auto; padding: 0 15px; display: flex; justify-content: center; }
        .video-card { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 100%; max-width: 400px; /* ভিডিওর ঘর ছোট করার জন্য */ transition: 0.3s; }
        .video-box { position: relative; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */ height: 0; overflow: hidden; border-radius: 10px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* কার্ড গ্রিড */
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 20px; }
        .card { background: white; border-radius: 25px; padding: 20px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); }

        .card-tools { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        .s-link { background: white; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 18px; transition: 0.3s; }
        .s-link:hover { transform: scale(1.2); }
        .share-btn { background: var(--brand-red) !important; color: white !important; cursor: pointer; border: none; }

        .img-box { width: 100%; height: 260px; border-radius: 20px; overflow: hidden; background: #eee; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .desc { color: #555; font-size: 14px; margin: 12px 0; border-left: 3px solid var(--brand-red); padding-left: 10px; height: 40px; overflow: hidden; }

        .counter { display: flex; align-items: center; justify-content: center; gap: 20px; background: #f8f9fa; border-radius: 40px; margin: 15px 0; padding: 10px; border: 1px solid #eee; }
        .count-btn { background: var(--brand-dark); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 24px; }
        .q-val { font-size: 24px; font-weight: bold; min-width: 35px; text-align: center; }

        .price { font-size: 28px; font-weight: bold; color: var(--brand-red); }
        .old { font-size: 16px; text-decoration: line-through; color: #aaa; margin-left: 10px; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; margin-top: 10px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 18px; color: white; }
        .btn-bkash { background: #e2136e; }
        .btn-wa { background: #25D366; }

        /* ফ্লোটিং কল বাটন */
        .float-call { position: fixed; bottom: 30px; right: 25px; background: #0984e3; color: white; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 2000; text-decoration: none; animation: pulse 2s infinite; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(9,132,227,0.7); } 70% { box-shadow: 0 0 0 20px rgba(9,132,227,0); } 100% { box-shadow: 0 0 0 0 rgba(9,132,227,0); } }
    </style>
</head>
<body>

<div class="scrolling-notice">
    <span>কুইক বাজার হোম সলিউশনে আপনাকে স্বাগতম! আমাদের এখানে পাবেন সেরা মানের স্যানিটারি পণ্য ও আধুনিক হোম সলিউশন। আজই ২০% ছাড়ে অর্ডার করুন! যোগাযোগ: ০১৭১১-XXXXXX</span>
</div>

<header>
    <a href="#" class="logo">QUICK <span>BAZAR</span></a>
    <div class="tagline">HOME SOLUTION</div>
</header>

<div class="search-area">
    <input type="text" id="search" placeholder="কি পণ্য খুঁজছেন? এখানে লিখুন..." onkeyup="filter()">
</div>

<div class="video-container">
    <div class="video-card">
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen loading="lazy"></iframe>
        </div>
    </div>
</div>

<div class="container" id="list">লোড হচ্ছে...</div>

<a href="tel:01700000000" class="float-call"><i class="fas fa-phone-alt"></i></a>

<script>
    const sheetId = '1cH7KsBpVu5NSaFrff2_Ac0cqoa3jXmQT2pT7fDk5DT8';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            const area = document.getElementById('list');
            area.innerHTML = '';

            rows.forEach((row, i) => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(col.length >= 2) {
                    const name = col[0].replace(/"/g, '');
                    const price = parseInt(col[1].replace(/"/g, ''));
                    const desc = col[2] ? col[2].replace(/"/g, '') : 'সেরা মানের স্যানিটারি পণ্য।';
                    const img = col[3] && col[3].length > 10 ? col[3].replace(/"/g, '') : 'https://picsum.photos/400/300?random='+i;

                    area.innerHTML += `
                    <div class="card" data-title="${name.toLowerCase()}">
                        <div class="card-tools">
                            <button class="s-link share-btn" onclick="shareMe('${name}')" title="শেয়ার করুন"><i class="fas fa-share-alt"></i></button>
                            <a href="#" class="s-link" style="color:#1877F2"><i class="fab fa-facebook-f"></i></a>
                            <a href="#" class="s-link" style="color:#000"><i class="fab fa-tiktok"></i></a>
                        </div>
                        <div class="img-box"><img src="${img}" alt="${name}" loading="lazy"></div>
                        <h3 style="margin: 15px 0 5px; font-size: 22px;">${name}</h3>
                        <div class="desc">${desc}</div>
                        <div class="price">৳${Math.floor(price*0.8)} <span class="old">৳${price}</span></div>
                        
                        <div class="counter">
                            <button class="count-btn" onclick="upd(${i},-1)">-</button>
                            <span class="q-val" id="q-${i}">0</span>
                            <button class="count-btn" onclick="upd(${i},1)">+</button>
                        </div>

                        <a href="tel:01700000000" class="btn btn-bkash"><i class="fas fa-credit-card"></i> বিকাশ পেমেন্ট</a>
                        <a href="javascript:void(0)" onclick="order('${name}',${i})" class="btn btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp অর্ডার</a>
                    </div>`;
                }
            });
        } catch(e) { console.error("Data Load Error"); }
    }

    function upd(i,d){ let q=document.getElementById('q-'+i); let v=parseInt(q.innerText)+d; if(v>=0) q.innerText=v; }
    
    function shareMe(n){ if(navigator.share) navigator.share({title:'Quick Bazar', text:n, url:window.location.href}); else alert("লিঙ্কটি কপি করে শেয়ার করুন।"); }

    function order(n,i){ 
        let q=document.getElementById('q-'+i).innerText; 
        if(q==0){ alert("অনুগ্রহ করে অন্তত ১টি পরিমাণ সিলেক্ট করুন!"); return; }
        const msg = `আসসালামু আলাইকুম, আমি কুইক বাজার হোম সলিউশন থেকে ${q} টি ${n} অর্ডার করতে চাই। দয়া করে বিস্তারিত জানাবেন।`;
        window.open(`https://wa.me/8801700000000?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function filter(){
        let input = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for(let card of cards){
            let title = card.getAttribute('data-title');
            card.style.display = title.includes(input) ? "block" : "none";
        }
    }
    loadData();
</script>

</body>
</html>
