<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Bazar Home Solution | ২০% বিশাল ছাড়!</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --brand-red: #d63031; --brand-dark: #2d3436; --bg: #f9f9f9; }
        * { box-sizing: border-box; }
        body { font-family: 'SolaimanLipi', Arial, sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        
        /* ওপরের স্ক্রলিং নোটিশ */
        .scrolling-notice {
            background: var(--brand-red); color: white;
            padding: 10px 0; font-weight: bold; font-size: 18px;
            white-space: nowrap; overflow: hidden;
        }
        .scrolling-notice span {
            display: inline-block; padding-left: 100%;
            animation: marquee 18s linear infinite;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* লোগো সেকশন - এখানে তোর চাওয়া অনুযায়ী ঠিক করা হয়েছে */
        header { 
            background: #fff; 
            padding: 30px 15px; 
            text-align: center; 
            border-bottom: 4px solid var(--brand-red);
        }
        
        .logo-wrap {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            animation: heartBeat 2s infinite; /* লোগোর হার্টবিট অ্যানিমেশন */
        }

        .logo-main { 
            font-size: 50px; /* লোগোর সাইজ সামঞ্জস্যপূর্ণ করা হয়েছে */
            font-weight: 900; 
            color: var(--brand-dark); 
            text-decoration: none;
            line-height: 1;
            margin: 0;
            text-transform: uppercase;
        }
        .logo-main span { color: var(--brand-red); }
        
        .logo-sub { 
            font-size: 20px; 
            color: #636e72; 
            letter-spacing: 6px; 
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* ভিডিও ও অন্যান্য সেকশন */
        .video-container { max-width: 320px; margin: 20px auto; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .search-area { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        #search { width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid #ddd; outline: none; font-size: 16px; }

        /* কার্ড ও অফার ব্যাজ */
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.05); overflow: visible; }
        
        .card-offer {
            position: absolute; top: -10px; right: -10px;
            background: var(--brand-red); color: white;
            padding: 8px 15px; border-radius: 10px;
            font-size: 14px; font-weight: bold; z-index: 10;
            animation: badgeShake 1.5s infinite;
        }
        @keyframes badgeShake { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* সোশ্যাল টুলস */
        .card-tools { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }
        .s-link { background: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 16px; }

        .img-box { width: 100%; height: 240px; border-radius: 15px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .price { font-size: 24px; font-weight: bold; color: var(--brand-red); margin-top: 10px; }
        .old { font-size: 14px; text-decoration: line-through; color: #999; margin-left: 8px; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; margin-top: 10px; border-radius: 12px; text-decoration: none; font-weight: bold; color: white; }
        .btn-wa { background: #25D366; }
        .btn-call { background: #0984e3; }
    </style>
</head>
<body>

<div class="scrolling-notice">
    <span>২০% ধামাকা অফার! কুইক বাজার হোম সলিউশনে আপনাকে স্বাগতম! যোগাযোগ: ০১৭১১-XXXXXX</span>
</div>

<header>
    <div class="logo-wrap">
        <a href="#" class="logo-main">QUICK <span>BAZAR</span></a>
        <div class="logo-sub">HOME SOLUTION</div>
    </div>
</header>

<div class="video-container">
    <div class="video-card">
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen loading="lazy"></iframe>
        </div>
    </div>
</div>

<div class="search-area">
    <input type="text" id="search" placeholder="পছন্দের মাল খুঁজুন..." onkeyup="filter()">
</div>

<div class="container" id="list">লোড হচ্ছে...</div>

<script>
    const sheetId = '1cH7KsBpVu5NSaFrff2_Ac0cqoa3jXmQT2pT7fDk5DT8';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function loadData() {
        const res = await fetch(csvUrl);
        const data = await res.text();
        const rows = data.split('\n').slice(1);
        const area = document.getElementById('list');
        area.innerHTML = '';

        rows.forEach((row, i) => {
            const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if(col.length >= 2) {
                const name = col[0].replace(/"/g, '');
                const price = parseInt(col[1].replace(/"/g, ''));
                const img = col[3] ? col[3].replace(/"/g, '') : 'https://picsum.photos/400/300?random='+i;

                area.innerHTML += `
                <div class="card" data-name="${name.toLowerCase()}">
                    <div class="card-offer">২০% ছাড়</div>
                    <div class="card-tools">
                        <a href="#" class="s-link" style="color:#1877F2"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="s-link" style="color:#E1306C"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="s-link" style="color:#000"><i class="fab fa-tiktok"></i></a>
                    </div>
                    <div class="img-box"><img src="${img}" loading="lazy"></div>
                    <h3 style="margin:15px 0 5px; font-size:20px;">${name}</h3>
                    <div class="price">৳${Math.floor(price*0.8)} <span class="old">৳${price}</span></div>
                    <a href="https://wa.me/8801700000000?text=অর্ডার: ${name}" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp অর্ডার</a>
                    <a href="tel:01700000000" class="btn btn-call"><i class="fas fa-phone-alt"></i> কল করুন</a>
                </div>`;
            }
        });
    }

    function filter() {
        let val = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for(let c of cards) { c.style.display = c.getAttribute('data-name').includes(val) ? "block" : "none"; }
    }
    loadData();
</script>

</body>
</html>
