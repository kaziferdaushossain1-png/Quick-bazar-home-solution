<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Bazar Home Solution | আধুনিক স্যানিটারি শপ</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --brand-red: #d63031; --brand-dark: #1a1a1a; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        
        /* হেডার ডিজাইন */
        header { 
            background: var(--brand-dark); color: white; padding: 20px; 
            border-bottom: 5px solid var(--brand-red);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-box { display: flex; flex-direction: column; text-align: left; }
        .logo { 
            font-size: 35px; font-weight: 900; letter-spacing: 1px; 
            text-decoration: none; color: white; animation: heart 2s infinite; 
        }
        .logo span { color: var(--brand-red); }
        .tagline { font-size: 14px; color: #ccc; letter-spacing: 2px; }

        @keyframes heart { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* উপরের ডানদিকের কল বাটন */
        .top-call {
            background: #0984e3; color: white; padding: 10px 20px; 
            border-radius: 30px; text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* সার্চ এরিয়া */
        .search-container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        #search { 
            width: 100%; padding: 15px 25px; border-radius: 35px; 
            border: 2px solid #ddd; outline: none; font-size: 16px;
        }

        /* ছোট ভিডিও সেকশন */
        .video-section { max-width: 400px; margin: 0 auto 20px; padding: 0 15px; }
        .video-card { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* মালের কার্ড গ্রিড */
        .container { 
            max-width: 1200px; margin: 0 auto; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; padding: 20px; 
        }
        .card { 
            background: white; border-radius: 25px; padding: 20px; 
            position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            transition: 0.3s; 
        }
        .card:hover { transform: translateY(-8px); }

        /* কার্ডের ভেতরের সোশ্যাল ও শেয়ার */
        .card-tools { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        .s-link { 
            background: white; width: 35px; height: 35px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }

        .img-box { width: 100%; height: 250px; border-radius: 15px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        .desc { color: #666; font-size: 14px; margin: 10px 0; border-left: 3px solid var(--brand-red); padding-left: 10px; height: 40px; overflow: hidden; }

        /* জিরো থেকে শুরু হওয়া কাউন্টার */
        .counter { 
            display: flex; align-items: center; justify-content: center; 
            gap: 20px; background: #f1f2f6; border-radius: 35px; 
            margin: 15px 0; padding: 8px; 
        }
        .c-btn { background: var(--brand-dark); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .q-val { font-size: 22px; font-weight: bold; min-width: 30px; text-align: center; }

        .price { font-size: 26px; font-weight: bold; color: var(--brand-red); }
        .old { font-size: 15px; text-decoration: line-through; color: #999; margin-left: 8px; }

        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            padding: 14px; margin-top: 10px; border-radius: 12px; 
            text-decoration: none; font-weight: bold; font-size: 16px; 
        }
        .btn-bkash { background: #e2136e; color: white; }
        .btn-wa { background: #25D366; color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <a href="#" class="logo">QUICK <span>BAZAR</span></a>
        <div class="tagline">HOME SOLUTION</div>
    </div>
    <a href="tel:01700000000" class="top-call">
        <i class="fas fa-phone-alt"></i> কল করুন
    </a>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="কি পণ্য খুঁজছেন? এখানে লিখুন..." onkeyup="filter()">
</div>

<div class="video-section">
    <div class="video-card">
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
        </div>
    </div>
</div>

<div class="container" id="product-list">তথ্য লোড হচ্ছে...</div>

<script>
    const sheetId = '1cH7KsBpVu5NSaFrff2_Ac0cqoa3jXmQT2pT7fDk5DT8';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    function changeQty(id, delta) {
        let q = document.getElementById('q-'+id);
        let v = parseInt(q.innerText) + delta;
        if(v >= 0) q.innerText = v;
    }

    function shareMe(n) {
        if(navigator.share) navigator.share({title:'Quick Bazar', text:n, url:window.location.href});
    }

    async function loadData() {
        const res = await fetch(csvUrl);
        const data = await res.text();
        const rows = data.split('\n').slice(1);
        const area = document.getElementById('product-list');
        area.innerHTML = '';

        rows.forEach((row, i) => {
            const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if(col.length >= 2) {
                const name = col[0].replace(/"/g, '');
                const price = parseInt(col[1].replace(/"/g, ''));
                const desc = col[2] ? col[2].replace(/"/g, '') : 'সেরা মানের পণ্য।';
                const img = col[3] && col[3].length > 10 ? col[3].replace(/"/g, '') : 'https://picsum.photos/400/300?random='+i;

                area.innerHTML += `
                <div class="card" data-name="${name.toLowerCase()}">
                    <div class="card-tools">
                        <button class="s-link" onclick="shareMe('${name}')" style="border:none; background:var(--brand-red); color:white;"><i class="fas fa-share-alt"></i></button>
                        <a href="#" class="s-link" style="color:#1877F2"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="s-link" style="color:#000"><i class="fab fa-tiktok"></i></a>
                    </div>
                    <div class="img-box"><img src="${img}" loading="lazy"></div>
                    <h3 style="margin:15px 0 5px;">${name}</h3>
                    <div class="desc">${desc}</div>
                    <div class="price">৳${Math.floor(price*0.8)} <span class="old">৳${price}</span></div>
                    
                    <div class="counter">
                        <button class="c-btn" onclick="changeQty(${i},-1)">-</button>
                        <span class="q-val" id="q-${i}">0</span>
                        <button class="c-btn" onclick="changeQty(${i},1)">+</button>
                    </div>

                    <a href="tel:01700000000" class="btn btn-bkash"><i class="fas fa-wallet"></i> বিকাশ পেমেন্ট</a>
                    <a href="https://wa.me/8801700000000?text=আমি ${name} অর্ডার করতে চাই" target="_blank" class="btn btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp অর্ডার</a>
                </div>`;
            }
        });
    }

    function filter() {
        let val = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for(let c of cards) {
            c.style.display = c.getAttribute('data-name').includes(val) ? "block" : "none";
        }
    }
    loadData();
</script>

</body>
</html>
