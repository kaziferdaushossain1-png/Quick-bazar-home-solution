<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Quick Bazar Home Solution | আধুনিক স্যানিটারি ও হোম সলিউশন</title>
    <meta name="description" content="Quick Bazar Home Solution - আপনার বাথরুম ও কিচেনের জন্য সেরা স্যানিটারি ফিটিংস। ২০% ছাড়ে আজই অর্ডার করুন!">
    <meta name="keywords" content="Quick Bazar, Home Solution, স্যানিটারি, বাথরুম ফিটিংস, কাজী ফেরদৌস, অনলাইন শপ">
    <meta name="author" content="Kazi Ferdaus">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --brand-red: #d63031; --brand-dark: #1a1a1a; --bg: #f4f7f6; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; scroll-behavior: smooth; color: #333; }
        
        /* লোগো ও হেডার */
        header { background: var(--brand-dark); color: white; padding: 25px 20px; text-align: left; border-bottom: 6px solid var(--brand-red); }
        .logo-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 40px; font-weight: 900; animation: heart 2s infinite; display: inline-block; text-decoration: none; color: white; }
        .logo span { color: var(--brand-red); }
        .tagline { font-size: 16px; color: #ccc; letter-spacing: 3px; margin-top: 5px; }

        @keyframes heart { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* সার্চ এরিয়া */
        .search-area { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        #search { width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid #ddd; outline: none; font-size: 16px; transition: 0.3s; }
        #search:focus { border-color: var(--brand-red); box-shadow: 0 0 10px rgba(214,48,49,0.1); }

        /* ছোট ও মার্জিত ভিডিও সেকশন */
        .video-container { max-width: 1200px; margin: 0 auto 20px auto; padding: 0 15px; display: flex; justify-content: center; }
        .video-card { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 100%; max-width: 400px; /* ভিডিওর ঘর ছোট করার জন্য */ transition: 0.3s; }
        .video-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .video-title { text-align: center; font-weight: bold; margin-bottom: 8px; color: var(--brand-dark); font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .video-box { position: relative; padding-bottom: 56.25%; /* 16:9 Aspect Ratio */ height: 0; overflow: hidden; border-radius: 10px; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* প্রোডাক্ট গ্রিড */
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; position: relative; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        .card-tools { position: absolute; top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }
        .s-link { background: #fff; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s; color: #555; }
        .s-link:hover { transform: scale(1.1); color: var(--brand-red); }
        .share-btn { background: var(--brand-red) !important; color: #fff !important; border: none; cursor: pointer; }

        .img-box { width: 100%; height: 250px; border-radius: 15px; overflow: hidden; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #aaa; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); }

        .desc { color: #666; font-size: 14px; margin: 12px 0; border-left: 3px solid var(--brand-red); padding-left: 10px; line-height: 1.6; height: 45px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .counter { display: flex; align-items: center; justify-content: center; gap: 15px; background: #f0f0f0; border-radius: 30px; margin: 15px 0; padding: 5px; border: 1px solid #eee; }
        .c-btn { background: var(--brand-dark); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .c-btn:hover { background: #333; }
        .c-btn:active { transform: scale(0.95); }
        .q-val { font-size: 20px; font-weight: bold; min-width: 25px; text-align: center; }

        .price-container { display: flex; align-items: baseline; justify-content: center; gap: 10px; margin-top: 10px; }
        .price { font-size: 28px; font-weight: bold; color: var(--brand-red); }
        .old { font-size: 16px; text-decoration: line-through; color: #999; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; margin-top: 10px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.3s; border: none; cursor: pointer; width: 100%; }
        .btn-bk { background: #e2136e; color: #fff; }
        .btn-wa { background: #25D366; color: #fff; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* ফ্লোটিং কল বাটন */
        .float-call { position: fixed; bottom: 25px; right: 25px; background: #0984e3; color: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 1000; animation: pulse 2s infinite; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(9,132,227,0.7); } 70% { box-shadow: 0 0 0 15px rgba(9,132,227,0); } 100% { box-shadow: 0 0 0 0 rgba(9,132,227,0); } }

        /* লোডিং টেক্সট */
        .loading { text-align: center; font-size: 18px; color: #777; margin-top: 50px; grid-column: 1 / -1; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div>
            <a href="#" class="logo">QUICK <span>BAZAR</span></a>
            <div class="tagline">HOME SOLUTION</div>
        </div>
    </div>
</header>

<div class="search-area">
    <input type="text" id="search" placeholder="আপনার পছন্দের স্যানিটারি পণ্যটি খুঁজুন..." onkeyup="filterProduct()">
</div>

<div class="video-container">
    <div class="video-card">
        <div class="video-title"><i class="fas fa-play-circle" style="color:var(--brand-red);"></i> আমাদের শোরুম ভিডিও</div>
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen loading="lazy"></iframe>
        </div>
    </div>
</div>

<div class="container" id="list">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i> গুগল শিট থেকে পণ্য লোড হচ্ছে...</div>
</div>

<a href="tel:01700000000" class="float-call"><i class="fas fa-phone-alt"></i></a>

<script>
    const sheetId = '1cH7KsBpVu5NSaFrff2_Ac0cqoa3jXmQT2pT7fDk5DT8';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function fetchData() {
        try {
            const res = await fetch(csvUrl);
            if (!res.ok) throw new Error('Network response was not ok');
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            const area = document.getElementById('list');
            area.innerHTML = '';

            if (rows.length === 0 || (rows.length === 1 && rows[0].trim() === "")) {
                area.innerHTML = '<div class="loading">কোনো পণ্য পাওয়া যায়নি।</div>';
                return;
            }

            rows.forEach((row, i) => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(col.length >= 2) {
                    const name = col[0] ? col[0].replace(/"/g, '').trim() : '';
                    if (!name) return; // নামের ঘর খালি থাকলে স্কিপ করবে

                    const priceStr = col[1] ? col[1].replace(/"/g, '').trim() : '0';
                    const price = parseInt(priceStr) || 0;
                    const desc = col[2] ? col[2].replace(/"/g, '').trim() : 'সেরা মানের স্যানিটারি পণ্য।';
                    const img = col[3] && col[3].length > 10 ? col[3].replace(/"/g, '').trim() : 'https://picsum.photos/400/300?random='+i;

                    area.innerHTML += `
                    <div class="card" data-n="${name.toLowerCase()}">
                        <div class="card-tools">
                            <button class="s-link share-btn" onclick="shareProduct('${name}')" title="শেয়ার করুন"><i class="fas fa-share-alt"></i></button>
                            <a href="https://facebook.com" target="_blank" class="s-link" style="color:#1877F2" title="ফেসবুক পেজ"><i class="fab fa-facebook-f"></i></a>
                        </div>
                        <div class="img-box"><img src="${img}" alt="${name}" loading="lazy"></div>
                        <h3 style="margin:15px 0 5px; font-size:22px; color:var(--brand-dark);">${name}</h3>
                        <div class="desc">${desc}</div>
                        <div class="price-container">
                            <div class="price">৳${Math.floor(price*0.8)}</div>
                            ${price > 0 ? `<div class="old">৳${price}</div>` : ''}
                        </div>
                        <div class="counter">
                            <button class="c-btn" onclick="updateQty(${i},-1)" title="কমান">-</button>
                            <span class="q-val" id="q-${i}">0</span>
                            <button class="c-btn" onclick="updateQty(${i},1)" title="বাড়ান">+</button>
                        </div>
                        <a href="tel:01700000000" class="btn btn-bk"><i class="fas fa-credit-card"></i> বিকাশ পেমেন্ট</a>
                        <a href="javascript:void(0)" onclick="orderWhatsApp('${name}',${i})" class="btn btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp অর্ডার</a>
                    </div>`;
                }
            });
        } catch(e) { 
            console.error("Fetch Error:", e);
            document.getElementById('list').innerHTML = '<div class="loading">পণ্য লোড করতে সমস্যা হয়েছে। দয়া করে পরে চেষ্টা করুন।</div>';
        }
    }

    function updateQty(i,d){ let q=document.getElementById('q-'+i); let v=parseInt(q.innerText)+d; if(v>=0) q.innerText=v; else q.innerText=0; }
    
    function shareProduct(n){ 
        if(navigator.share) {
            navigator.share({title:'Quick Bazar Home Solution', text:`${n} - অসাধারণ অফারে কিনুন কুইক বাজার থেকে!`, url:window.location.href})
            .catch(console.error);
        } else { 
            alert("লিঙ্কটি কপি করে শেয়ার করুন।"); 
        } 
    }

    function orderWhatsApp(n,i){ 
        let q=document.getElementById('q-'+i).innerText; 
        if(q==0){ alert("অনুগ্রহ করে পরিমাণ (Quantity) অন্তত ১টি সিলেক্ট করুন!"); return; }
        const msg = `আসসালামু আলাইকুম, কুইক বাজার হোম সলিউশন থেকে আমি ${q} টি '${n}' অর্ডার করতে চাই। দয়া করে বিস্তারিত জানাবেন।`;
        window.open(`https://wa.me/8801700000000?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function filterProduct(){
        let val = document.getElementById('search').value.toLowerCase().trim();
        let items = document.getElementsByClassName('card');
        let found = false;
        for(let it of items){ 
            if(it.getAttribute('data-n').includes(val)) {
                it.style.display = "block";
                found = true;
            } else {
                it.style.display = "none";
            }
        }
        // সার্চ রেজাল্ট না পাওয়া গেলে মেসেজ (ঐচ্ছিক)
        const area = document.getElementById('list');
        if(!found && val !== "") {
            if(!document.getElementById('no-results')) {
                area.innerHTML += '<div id="no-results" class="loading">দুঃখিত, আপনার সার্চ করা পণ্যটি পাওয়া যায়নি।</div>';
            }
        } else {
            const noRes = document.getElementById('no-results');
            if(noRes) noRes.remove();
            if(area.innerHTML === "" && val === "") fetchData(); // আবার লোড করবে যদি সার্চ খালি হয়
        }
    }

    // গুগল শীট থেকে ডেটা লোড করার আগে সার্চ ইনপুট ডিজেবল রাখা (ঐচ্ছিক ভালো প্র্যাকটিস)
    document.getElementById('search').disabled = true;

    fetchData().then(() => {
        document.getElementById('search').disabled = false; // লোড শেষ হলে ইনপুট এনেবল করবে
    });
</script>
</body>
</html>
